<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المشاريع</title>
</head>

<body>

<h2>📊 المشاريع</h2>

<table id="table" border="1"></table>

<script>
fetch("data.csv")
.then(res => res.text())
.then(data => {
    let rows = data.split("\n");
    let table = document.getElementById("table");

    rows.forEach((row, index) => {
        let tr = document.createElement("tr");
        let cols = row.split(",");

        cols.forEach(col => {
            let cell = document.createElement(index === 0 ? "th" : "td");
            cell.innerText = col;
            tr.appendChild(cell);
        });

        table.appendChild(tr);
    });
});
</script>

</body>
</html>
